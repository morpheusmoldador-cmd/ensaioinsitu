<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ensaio de Densidade - Pro</title>
    <style>
        :root {
            --primary: #2563eb;
            --success: #16a34a;
            --danger: #dc2626;
            --bg: #f1f5f9;
        }

        body { font-family: sans-serif; background-color: var(--bg); margin: 0; padding: 10px; display: flex; flex-direction: column; align-items: center; }
        .container { background: white; width: 100%; max-width: 450px; padding: 20px; border-radius: 12px; box-shadow: 0 10px 15px -3px rgba(0,0,0,0.1); }
        h2 { text-align: center; color: #1e293b; font-size: 1.1rem; margin-bottom: 15px; border-bottom: 2px solid var(--primary); padding-bottom: 10px; }
        
        .section-title { font-size: 0.85rem; color: var(--primary); font-weight: bold; margin: 15px 0 8px 0; text-transform: uppercase; border-left: 3px solid var(--primary); padding-left: 5px; }
        
        .button-group { display: flex; gap: 8px; margin-bottom: 15px; }
        .btn-toggle { flex: 1; padding: 10px; border: none; border-radius: 6px; background: #cbd5e1; cursor: pointer; font-weight: bold; font-size: 13px; }
        .btn-toggle.active { background: var(--primary); color: white; }

        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .input-group { margin-bottom: 10px; }
        label { display: block; margin-bottom: 3px; color: #475569; font-size: 11px; font-weight: bold; }
        input { width: 100%; padding: 8px; border: 1px solid #cbd5e1; border-radius: 6px; box-sizing: border-box; font-size: 14px; background: #fdfdfd; }
        
        #btnCalcular { width: 100%; padding: 15px; background: #0f172a; color: white; border: none; border-radius: 6px; font-size: 16px; font-weight: bold; margin-top: 15px; cursor: pointer; }
        #btnPrepararPrint { width: 100%; padding: 12px; background: #64748b; color: white; border: none; border-radius: 6px; font-size: 14px; font-weight: bold; margin-top: 10px; cursor: pointer; display: none; }
        
        #btnVoltar { display: none; width: 100%; max-width: 450px; padding: 12px; background: var(--danger); color: white; border: none; border-radius: 6px; font-size: 14px; font-weight: bold; margin-bottom: 10px; cursor: pointer; text-transform: uppercase; }

        #resultado { margin-top: 20px; padding: 15px; border-radius: 8px; display: none; }
        .card-result { background: #f8fafc; border: 1px solid #e2e8f0; padding: 12px; border-radius: 6px; margin-top: 10px; font-size: 13px; line-height: 1.7; color: #334155; }
        .status { text-align: center; font-size: 18px; font-weight: bold; margin-top: 10px; padding: 10px; border-radius: 6px; }
        .passou { background: #dcfce7; color: var(--success); border: 1px solid var(--success); }
        .reprovou { background: #fee2e2; color: var(--danger); border: 1px solid var(--danger); }

        /* Estilos para o Modo Print */
        .print-mode { background: white; padding: 0; }
        .print-mode .container { box-shadow: none; width: 100vw; max-width: none; border-radius: 0; }
        .print-mode input { border: none !important; padding: 2px 0 !important; background: transparent !important; font-weight: bold; color: black; -webkit-appearance: none; }
        .print-mode .no-print { display: none !important; }
        .print-mode #btnVoltar { display: block !important; }
    </style>
</head>
<body id="mainBody">

    <button id="btnVoltar" onclick="desativarModoPrint()">← Voltar para Edição</button>

    <div class="container" id="appContent">
        <h2>Ensaio de Compactação</h2>

        <div class="section-title">Identificação</div>
        <div class="grid">
            <div class="input-group">
                <label>Número de Registro</label>
                <input type="text" id="registro" placeholder="Ex: 001/24">
            </div>
            <div class="input-group">
                <label>Data</label>
                <input type="date" id="dataEnsaio">
            </div>
        </div>
        
        <div class="grid">
            <div class="input-group">
                <label>Estaca Inicial</label>
                <input type="text" id="estacaIni" placeholder="0+000">
            </div>
            <div class="input-group">
                <label>Estaca Final</label>
                <input type="text" id="estacaFin" placeholder="0+020">
            </div>
        </div>

        <div class="button-group no-print">
            <button class="btn-toggle active" id="btnAterro" onclick="setModo('aterro')">Aterro (±3%)</button>
            <button class="btn-toggle" id="btnCFT" onclick="setModo('cft')">CFT (±2%)</button>
        </div>

        <div class="section-title">Dados de Laboratório</div>
        <div class="grid">
            <div class="input-group">
                <label>Dens. Máx. Seca (Lab)</label>
                <input type="number" id="densMax" placeholder="g/cm³" step="0.001">
            </div>
            <div class="input-group">
                <label>Umidade Ótima (%)</label>
                <input type="number" id="umiOti" placeholder="%" step="0.1">
            </div>
        </div>

        <div class="section-title">Frasco de Areia</div>
        <div class="input-group">
            <label>Densidade da Areia (g/cm³)</label>
            <input type="number" id="densAreia" value="1.418" step="0.001">
        </div>
        <div class="grid">
            <div class="input-group">
                <label>P. Inicial (g)</label>
                <input type="number" id="pFrascoAntes" value="7000">
            </div>
            <div class="input-group">
                <label>P. Final (g)</label>
                <input type="number" id="pFrascoDepois">
            </div>
        </div>
        <div class="input-group">
            <label>Peso Areia Funil (g)</label>
            <input type="number" id="pFunil" value="0">
        </div>

        <div class="section-title">Solo e Umidade</div>
        <div class="input-group">
            <label>Peso Solo Úmido Total (g)</label>
            <input type="number" id="pSoloUmidoFuro">
        </div>
        <div class="grid">
            <div class="input-group">
                <label>P. Amostra Úmida + Tara (g)</label>
                <input type="number" id="pAmostraUmida" value="100">
            </div>
            <div class="input-group">
                <label>P. Amostra Seca + Tara (g)</label>
                <input type="number" id="pAmostraSeca">
            </div>
        </div>
        <div class="input-group">
            <label>Peso da Tara (g)</label>
            <input type="number" id="pTara" value="0">
        </div>

        <button id="btnCalcular" class="no-print" onclick="calcular()">CALCULAR E VERIFICAR</button>

        <div id="resultado">
            <div class="card-result" id="detalhes"></div>
            <div id="statusFinal" class="status"></div>
        </div>

        <button id="btnPrepararPrint" class="no-print" onclick="ativarModoPrint()">PREPARAR PARA PRINT (ENQUADRAR)</button>
    </div>

<script>
    let modoAtual = 'aterro';

    // Configura a data de hoje por padrão
    document.getElementById('dataEnsaio').valueAsDate = new Date();

    function setModo(modo) {
        modoAtual = modo;
        document.getElementById('btnAterro').classList.toggle('active', modo === 'aterro');
        document.getElementById('btnCFT').classList.toggle('active', modo === 'cft');
    }

    function calcular() {
        const dMaxLab = parseFloat(document.getElementById('densMax').value);
        const hOtima = parseFloat(document.getElementById('umiOti').value);
        const densAreia = parseFloat(document.getElementById('densAreia').value);
        const pAntes = parseFloat(document.getElementById('pFrascoAntes').value);
        const pDepois = parseFloat(document.getElementById('pFrascoDepois').value);
        const pFunil = parseFloat(document.getElementById('pFunil').value);
        const pSUmidoFuro = parseFloat(document.getElementById('pSoloUmidoFuro').value);
        const pAUmida = parseFloat(document.getElementById('pAmostraUmida').value);
        const pASeca = parseFloat(document.getElementById('pAmostraSeca').value);
        const pTara = parseFloat(document.getElementById('pTara').value);

        if ([dMaxLab, hOtima, densAreia, pAntes, pDepois, pSUmidoFuro, pAUmida, pASeca].some(isNaN)) {
            alert("Preencha todos os campos corretamente.");
            return;
        }

        const umidadeReal = ((pAUmida - pASeca) / (pASeca - pTara)) * 100;
        const massaAreiaFuro = (pAntes - pDepois) - pFunil;
        const volumeFuro = massaAreiaFuro / densAreia;
        const densidadeUmidaCampo = pSUmidoFuro / volumeFuro;
        const densidadeSecaCampo = densidadeUmidaCampo / (1 + (umidadeReal / 100));
        const gc = (densidadeSecaCampo * 100000 / dMaxLab) ;
        const desvio = umidadeReal - hOtima;
        const tolerancia = (modoAtual === 'aterro') ? 3 : 2;

        document.getElementById('resultado').style.display = 'block';
        document.getElementById('btnPrepararPrint').style.display = 'block';
        
        // Formatação da data para o relatório
        const dataInput = document.getElementById('dataEnsaio').value;
        const dataFormatada = dataInput ? dataInput.split('-').reverse().join('/') : '---';

        document.getElementById('detalhes').innerHTML = `
            <strong>REGISTRO:</strong> ${document.getElementById('registro').value || '---'} | <strong>DATA:</strong> ${dataFormatada}<br>
            <strong>ESTACAS:</strong> ${document.getElementById('estacaIni').value || '0'} a ${document.getElementById('estacaFin').value || '0'}<br>
            <hr style="border:0; border-top:1px solid #e2e8f0; margin:8px 0">
            <strong>Volume do Furo:</strong> ${volumeFuro.toFixed(2)} cm³<br>
            <strong>Umidade Real:</strong> ${umidadeReal.toFixed(2)}%<br>
            <strong>Densidade Seca Campo:</strong> ${densidadeSecaCampo.toFixed(3)} g/cm³<br>
            <strong>Grau de Compactação:</strong> ${gc.toFixed(4)}%<br>
            <strong>Desvio Umidade:</strong> ${desvio.toFixed(2)}% (Margem: ±${tolerancia}%)
        `;

        const aprovadoGC = gc >= 100;
        const aprovadoUmi = Math.abs(desvio) <= tolerancia;
        const divStatus = document.getElementById('statusFinal');

        if (aprovadoGC && aprovadoUmi) {
            divStatus.className = 'status passou';
            divStatus.innerHTML = "APROVADO ✅";
        } else {
            divStatus.className = 'status reprovou';
            divStatus.innerHTML = `REPROVADO ❌<br><small style="font-size:11px">${!aprovadoGC ? '- GC < 100% ' : ''}${!aprovadoUmi ? '- Umidade fora da margem' : ''}</small>`;
        }
        window.scrollTo(0, document.body.scrollHeight);
    }

    function ativarModoPrint() {
        document.getElementById('mainBody').classList.add('print-mode');
        window.scrollTo(0, 0);
    }

    function desativarModoPrint() {
        document.getElementById('mainBody').classList.remove('print-mode');
    }
</script>

</body>
</html>
